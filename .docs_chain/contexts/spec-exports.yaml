context: spec-exports
description: >
  HelixVPN spec markdown → HTML/PDF/DOCX export sync (§11.4.65 + §11.4.153).
  Authority = the .md files under docs/research/mvp/final/; derived = their
  .html + .pdf + .docx siblings. The sync_all_markdown_exports.sh script
  handles the actual pandoc+weasyprint rendering + mermaid pre-rendering
  (§11.4.168). This context covers the spine + volume overviews; the script
  handles the full recursive tree. db-to-md direction is PLANNED (HVPN-P1-150).
nodes:
  # Authority: spine + overviews
  spec_md:      { kind: markdown, path: docs/research/mvp/final/SPECIFICATION.md }
  spec_html:    { kind: html,     path: docs/research/mvp/final/SPECIFICATION.html }
  spec_pdf:     { kind: pdf,      path: docs/research/mvp/final/SPECIFICATION.pdf }
  spec_docx:    { kind: docx,     path: docs/research/mvp/final/SPECIFICATION.docx }
  idx_md:       { kind: markdown, path: docs/research/mvp/final/MASTER_INDEX.md }
  idx_html:     { kind: html,     path: docs/research/mvp/final/MASTER_INDEX.html }
  idx_pdf:      { kind: pdf,      path: docs/research/mvp/final/MASTER_INDEX.pdf }
  idx_docx:     { kind: docx,     path: docs/research/mvp/final/MASTER_INDEX.docx }
  p0_md:        { kind: markdown, path: docs/research/mvp/final/00-product-scope-and-principles.md }
  p0_html:      { kind: html,     path: docs/research/mvp/final/00-product-scope-and-principles.html }
  p0_pdf:       { kind: pdf,      path: docs/research/mvp/final/00-product-scope-and-principles.pdf }
  p0_docx:      { kind: docx,     path: docs/research/mvp/final/00-product-scope-and-principles.docx }
  dp_md:        { kind: markdown, path: docs/research/mvp/final/01-data-plane.md }
  dp_html:      { kind: html,     path: docs/research/mvp/final/01-data-plane.html }
  dp_pdf:       { kind: pdf,      path: docs/research/mvp/final/01-data-plane.pdf }
  dp_docx:      { kind: docx,     path: docs/research/mvp/final/01-data-plane.docx }
  cp_md:        { kind: markdown, path: docs/research/mvp/final/02-control-plane.md }
  cp_html:      { kind: html,     path: docs/research/mvp/final/02-control-plane.html }
  cp_pdf:       { kind: pdf,      path: docs/research/mvp/final/02-control-plane.pdf }
  cp_docx:      { kind: docx,     path: docs/research/mvp/final/02-control-plane.docx }
edges:
  - { type: derive-from, from: spec_md,   to: spec_html, transform: md2html }
  - { type: derive-from, from: spec_html,  to: spec_pdf,  transform: html2pdf }
  - { type: derive-from, from: spec_md,   to: spec_docx, transform: md2docx }
  - { type: derive-from, from: idx_md,    to: idx_html,  transform: md2html }
  - { type: derive-from, from: idx_html,   to: idx_pdf,   transform: html2pdf }
  - { type: derive-from, from: idx_md,    to: idx_docx,  transform: md2docx }
  - { type: derive-from, from: p0_md,     to: p0_html,   transform: md2html }
  - { type: derive-from, from: p0_html,    to: p0_pdf,    transform: html2pdf }
  - { type: derive-from, from: p0_md,     to: p0_docx,   transform: md2docx }
  - { type: derive-from, from: dp_md,     to: dp_html,   transform: md2html }
  - { type: derive-from, from: dp_html,    to: dp_pdf,    transform: html2pdf }
  - { type: derive-from, from: dp_md,     to: dp_docx,   transform: md2docx }
  - { type: derive-from, from: cp_md,     to: cp_html,   transform: md2html }
  - { type: derive-from, from: cp_html,    to: cp_pdf,    transform: html2pdf }
  - { type: derive-from, from: cp_md,     to: cp_docx,   transform: md2docx }
transforms:
  md2html:   { builtin: pandoc-html }
  html2pdf:  { builtin: weasyprint-pdf }
  md2docx:   { builtin: pandoc-docx }
