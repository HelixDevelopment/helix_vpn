context: design
description: >
  HelixVPN design system documentation chain (§11.4.162 OpenDesign mandate,
  §11.4.65 Universal export). The source markdown files under docs/design/
  are the authority; their centralized html + pdf siblings under
  docs/design/exports/ are derived via pandoc+weasyprint (same builtins as
  the spec-exports context for the spec tree, except exports here are
  centralized into an exports/ directory rather than side-by-side).
nodes:
  # Authority: design system markdown sources
  ds_md:          { kind: markdown, path: docs/design/README.md }
  comp_md:        { kind: markdown, path: docs/design/components/README.md }
  screens_md:     { kind: markdown, path: docs/design/screens/README.md }
  interact_md:    { kind: markdown, path: docs/design/interaction/README.md }

  # Derived: centralized html + pdf exports under docs/design/exports/
  ds_html:        { kind: html, path: docs/design/exports/HelixVPN-Design-System.html }
  ds_pdf:         { kind: pdf,  path: docs/design/exports/HelixVPN-Design-System.pdf }
  comp_html:      { kind: html, path: docs/design/exports/HelixVPN-Component-Library.html }
  comp_pdf:       { kind: pdf,  path: docs/design/exports/HelixVPN-Component-Library.pdf }
  screens_html:   { kind: html, path: docs/design/exports/HelixVPN-Screen-Wireframes.html }
  screens_pdf:    { kind: pdf,  path: docs/design/exports/HelixVPN-Screen-Wireframes.pdf }
  interact_html:  { kind: html, path: docs/design/exports/HelixVPN-Interaction-Specs.html }
  interact_pdf:   { kind: pdf,  path: docs/design/exports/HelixVPN-Interaction-Specs.pdf }

edges:
  # Design system README -> exports
  - { type: derive-from, from: ds_md,      to: ds_html,      transform: md-to-html }
  - { type: derive-from, from: ds_html,    to: ds_pdf,       transform: html-to-pdf }

  # Components README -> exports
  - { type: derive-from, from: comp_md,    to: comp_html,    transform: md-to-html }
  - { type: derive-from, from: comp_html,  to: comp_pdf,     transform: html-to-pdf }

  # Screens README -> exports
  - { type: derive-from, from: screens_md, to: screens_html, transform: md-to-html }
  - { type: derive-from, from: screens_html, to: screens_pdf, transform: html-to-pdf }

  # Interaction README -> exports
  - { type: derive-from, from: interact_md, to: interact_html, transform: md-to-html }
  - { type: derive-from, from: interact_html, to: interact_pdf, transform: html-to-pdf }

transforms:
  md-to-html:  { builtin: pandoc-html }
  html-to-pdf: { builtin: weasyprint-pdf }
